services:
  redis:
    image: redis:7-alpine
    container_name: cphos-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    image: ${APP_IMAGE:-ghcr.io/cphos/ai-customer-service:latest}
    container_name: cphos-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      RELOAD: "false"
      HOST: 0.0.0.0
      PORT: "8000"
    volumes:
      - ./logs:/app/logs
      - ./references:/app/references:ro
      - ./cphos.npz:/app/cphos.npz:ro
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
